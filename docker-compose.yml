
services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfilen8n
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - NODE_ENV=production
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
    volumes:
      - ./.n8n:/home/node/.n8n
      - ./reports:/reports
    networks:
      - n8n_network
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api
    ports:
      - "8080:8080"
    networks:
      - n8n_network
    environment:
      - N8N_HOST=n8n
      - N8N_PORT=5678
    restart: unless-stopped
    depends_on:
      - n8n
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped
    networks:
      - n8n_network


volumes:
  n8n_storage:
  ollama:


networks:
  n8n_network:
    driver: bridge
